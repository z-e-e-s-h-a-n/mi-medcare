steps:
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/mi-medcare-api:$COMMIT_SHA", "."]
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/mi-medcare-api:$COMMIT_SHA"]
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      [
        "run",
        "deploy",
        "mi-medcare-api",
        "--image",
        "gcr.io/$PROJECT_ID/mi-medcare-api:$COMMIT_SHA",
        "--region",
        "asia-south1",
        "--allow-unauthenticated",
        "--min-instances",
        "1",
        "--max-instances",
        "10",
        "--port",
        "8080"
      ]

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - "gcr.io/$PROJECT_ID/mi-medcare-api:$COMMIT_SHA"
