steps:
  # ---------- Build Docker Image ----------
  - name: gcr.io/cloud-builders/docker
    env:
      - DOCKER_BUILDKIT=1 # enable BuildKit for --mount=cache
    args:
      [
        "build",
        "-t",
        "${_AR_HOST}/$PROJECT_ID/${_AR_REPO}/mi-medcare-api:$COMMIT_SHA",
        ".",
      ]

  # ---------- Push Docker Image ----------
  - name: gcr.io/cloud-builders/docker
    args:
      ["push", "${_AR_HOST}/$PROJECT_ID/${_AR_REPO}/mi-medcare-api:$COMMIT_SHA"]

  # ---------- Update Migration Job ----------
  - name: gcr.io/cloud-builders/gcloud
    args:
      [
        "run",
        "jobs",
        "update",
        "mi-medcare-migrate",
        "--image",
        "${_AR_HOST}/$PROJECT_ID/${_AR_REPO}/mi-medcare-api:$COMMIT_SHA",
        "--region",
        "us-central1",
        "--command",
        "pnpm",
        "--args=--filter,@workspace/db,prisma:deploy",
      ]

  # ---------- Execute Migration Job ----------
  - name: gcr.io/cloud-builders/gcloud
    args:
      [
        "run",
        "jobs",
        "execute",
        "mi-medcare-migrate",
        "--region",
        "us-central1",
        "--wait",
      ]

  # ---------- Deploy Cloud Run Service ----------
  - name: gcr.io/cloud-builders/gcloud
    args:
      [
        "run",
        "deploy",
        "mi-medcare-api",
        "--image",
        "${_AR_HOST}/$PROJECT_ID/${_AR_REPO}/mi-medcare-api:$COMMIT_SHA",
        "--region",
        "us-central1",
        "--platform",
        "managed",
        "--allow-unauthenticated",
        "--port",
        "8080",
        "--min-instances",
        "1",
        "--max-instances",
        "10",
        "--memory",
        "1Gi",
      ]

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - "${_AR_HOST}/$PROJECT_ID/${_AR_REPO}/mi-medcare-api:$COMMIT_SHA"

substitutions:
  _AR_HOST: us-central1-docker.pkg.dev
  _AR_REPO: mi-medcare
